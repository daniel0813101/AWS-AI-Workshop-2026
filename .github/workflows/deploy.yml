name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'project2/webui/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: project2/webui/package-lock.json

      - name: Install dependencies
        run: cd project2/webui && npm ci

      - name: Build
        run: cd project2/webui && npm run build
        env:
          VITE_WS_ENDPOINT: ${{ secrets.VITE_WS_ENDPOINT }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: project2/webui/dist

      - id: deployment
        uses: actions/deploy-pages@v4
